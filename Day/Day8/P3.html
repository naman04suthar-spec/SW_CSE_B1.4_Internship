<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic javascript code</title>
</head>
<body>
    <button onclick="changeText()">Click me </button>
    <p id="demo">Hello</p>
    <script>
        function changeText(){
            document.getElementById("demo").textContent="Namaskara Bengaluru"
        }
    </script>
</body>
</html>

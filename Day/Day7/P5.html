<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox: flex-item</title>
    <style>
        .nav{
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: burlywood;
            padding: 10px;
            color: crimson;
        }
        .nav-links{
            display: flex;
            gap: 16px;
            list-style: none;
        }
        .nav-links a{
            color: chocolate;
            text-decoration: none;

        }
        .nav-links a:hover{
            text-decoration: underline;
            color: black;
        }
    </style>
</head>
<body>
    <p>
        flex-item properties:
        1. flex-grow 
        2. flex-shrink 
        3. flex basis 
        4. flex-shorthand 
        5. align-self 
        6. order 

        flexbox patterns:
        1. center a both horizontally & vertically 
        2. simple navigation bar 
        3. Responsive card layout 
        4. Two-column layout(sidebar + main) 

    </p>
    <nav class="nav">
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Links</a></li>

        </ul>
    </nav>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo-element Selector(::)</title>
    <style>
        p::first-letter{
            font-size: 300%;
        }
        p::first-line{
            font-weight:bold;
        }
    </style>
</head>
<body>
    <p>Pseudo-element Selector : style parts of an element</p>
    <h1>Heading 1</h1>
    <p>this is a program</p>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attribute Selector</title>
    <style>
       a:hover{
                color: brown;
                background-color:chartreuse ;
                text-decoration: underline;
        }
        input:focus{
            outline: 2px solid #1216ec
        }
    </style>
</head>
<body>
    <p>Pseudo-class Selector : select elements in a certain state(hovered,focused,first child)</p>
    <h1>Heading 1</h1>
    <a href="https://www.google.com">Take me to google.com</a> <br><br>
    <input type="text" name="" id="">
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSL colors</title>
    <style>
        /* HSL colors: Hue[0-360](0:red,120:green,240:blue),
        Saturation: 0-100% how vivid or gray the color is
        Lightness: 0-100% how light or dark the color is
        a: transparency(0-1)value */
        p{    
            /* 0 - 255 */
            color: hsl(276, 98%, 50%);
            font-size: large;
        }
        h1{
            /* Transparency: 0 - 1 */
            color: hsla(276, 21%, 25%, 0.6);
        }
    </style>
</head>
<body>
    <p>Paragraph</p>
    <h1>Heading 1</h1>
   
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML tables</title>
</head>
<body>
    <p>HTML tables</p>
    <table border="1">
        <!-- not a supported method of border -->
        <tr>
            <th>Month</th>
            <th>savings</th>
        </tr>
        <tr>
            <td>june</td>
            <td>50000</td>
        </tr>
        <tr>
            <td>july</td>
            <td>40000</td>
        </tr>
    </table>
    <table border="1">
        <caption>Sales Data</caption>
        <thead> 
            <tr>
            <th>Month</th>
            <th>savings</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td>june</td>
            <td>50000</td>
        </tr>
        <tr>
            <td>july</td>
            <td>40000</td>
    </tbody>
    <tfoot>
        <tr>
                <td>Total</td>
                <td>1250000</td>
            </tr>
    </tfoot>
    </table>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=\, initial-scale=1.0">
    <title>Table tag: Span row/col</title>
</head>
<body>
    <table border="1">
        <tr>
            <th colspan="3">
                Student details
            </th>
        </tr>
        <tr>
            <td>Name</td>
            <td>Naman</td>
            <td>mohit</td>
        </tr>
        <tr>
            <td>Course</td>
            <td>Full stack development</td>
            <td>ai</td>
        </tr>
    </table>
    <p>Rowspan</p>
    <table border="1">
        <tr>
            <th rowspan="2">Day</th>
            <th>Morning</th>
            <th>Evening</th>
        </tr>
        <tr>
            <td>Frontend learning</td>
            <td>Frontend practice</td>
        </tr>
    </table>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID selector</title>
    <style>
        #para1{
            background-color: aqua;
        }
    </style>
</head>
<body>
    <p id="para1">
        Paragraph 1
    </p>
    <p>Paragraph 2</p>
    <!-- we usually use it whenever we want to uniquely identify particular elemnet, class selector we use it more than once not uniquely, it may be repeated multiple times but outcome is gonna be the same -->
</body>
</html>

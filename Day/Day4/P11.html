<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Child selector</title>
    <style>
        ol > li{
                color: brown;
                background-color: aqua;

        }
    </style>
</head>
<body>
    <p>Targets elements that are direct children other (one level down)</p>
    <h1>Heading 1</h1>
    <ol>
        <li>Laptop</li>
        <li>Mobile</li>
        <li>Tablet</li>
    </ol>
</body>
</html>
